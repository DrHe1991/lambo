name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ui/package-lock.json'

      - name: Build UI
        working-directory: ./ui
        run: |
          npm ci
          VITE_API_URL=https://api.${{ secrets.DOMAIN }} npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bitlink
            git pull origin main

      - name: Copy UI build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'ui/dist/'
          target: '~/bitlink/'
          overwrite: true

      - name: Restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bitlink
            docker compose -f docker-compose.prod.yml --env-file .env.prod build api pay
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker compose -f docker-compose.prod.yml exec -T pay alembic upgrade head

            # Verify health
            sleep 5
            curl -sf http://localhost:8000/health || echo "API health check failed"
