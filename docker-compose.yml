services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bitlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitlink
      POSTGRES_PASSWORD: bitlink_dev_password
      POSTGRES_DB: bitlink
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bitlink -d bitlink']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bitlink-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: bitlink-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: bitlink
      MINIO_ROOT_PASSWORD: bitlink_dev_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Python API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bitlink-api
    restart: unless-stopped
    ports:
      - '8003:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://bitlink:bitlink_dev_password@postgres:5432/bitlink
      REDIS_URL: redis://redis:6379/0
      ENV: development
      DEBUG: 'false'
      PAY_SERVICE_URL: http://pay:8000
      PAY_APP_ID: '1'
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: bitlink
      S3_SECRET_KEY: bitlink_dev_password
      S3_PUBLIC_URL: http://localhost:9000
      GOOGLE_CLIENT_ID: '292172431256-hotp58doi02m8do3kg64qq2qn9qjil9f.apps.googleusercontent.com'
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      pay:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ui
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      VITE_API_URL: http://localhost:8003
      VITE_WC_PROJECT_ID: '76b9cd0936b1b074a6c42d5efd4ea8e2'
      VITE_GOOGLE_CLIENT_ID: '292172431256-hotp58doi02m8do3kg64qq2qn9qjil9f.apps.googleusercontent.com'
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - api

  # Settlement Cron Job - settles expired pending likes every minute
  cron:
    image: curlimages/curl:8.5.0
    container_name: bitlink-cron
    restart: unless-stopped
    user: root
    depends_on:
      - api
    entrypoint: /bin/sh
    command: >
      -c "while true; do
            sleep 60;
            curl -s -X POST http://api:8000/api/settlement/settle-likes?batch_size=100;
          done"

  # Web3 Payment Gateway
  pay:
    build:
      context: ./pay
      dockerfile: Dockerfile
    container_name: bitlink-pay
    restart: unless-stopped
    ports:
      - '8005:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://bitlink:bitlink_dev_password@postgres:5432/bitlink
      REDIS_URL: redis://redis:6379/1
      ENV: development
      DEBUG: 'true'
      TRON_NETWORK: shasta
      TRON_XPUB: ${TRON_XPUB:-}
      TRON_API_KEY: ${TRON_API_KEY:-}
    volumes:
      - ./pay:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  minio_data:
