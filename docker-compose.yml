services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bitlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitlink
      POSTGRES_PASSWORD: bitlink_dev_password
      POSTGRES_DB: bitlink
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bitlink -d bitlink']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bitlink-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: bitlink-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: bitlink
      MINIO_ROOT_PASSWORD: bitlink_dev_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Python API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bitlink-api
    restart: unless-stopped
    ports:
      - '8003:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://bitlink:bitlink_dev_password@postgres:5432/bitlink
      REDIS_URL: redis://redis:6379/0
      ENV: development
      DEBUG: 'false'
      PRIVY_APP_ID: ${PRIVY_APP_ID:-}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-https://mainnet.base.org}
      USDC_ADDRESS: ${USDC_ADDRESS:-0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: bitlink
      S3_SECRET_KEY: bitlink_dev_password
      S3_PUBLIC_URL: http://localhost:9000
      GOOGLE_CLIENT_ID: '292172431256-hotp58doi02m8do3kg64qq2qn9qjil9f.apps.googleusercontent.com'
      BANKOFAI_API_KEY: ${BANKOFAI_API_KEY:-}
      BANKOFAI_MODEL: ${BANKOFAI_MODEL:-gpt-5.4-mini}
      AI_ENABLED: ${AI_ENABLED:-true}
      FREE_POSTS_PER_DAY: ${FREE_POSTS_PER_DAY:-3}
      FREE_ARTICLES_PER_DAY: ${FREE_ARTICLES_PER_DAY:-1}
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ui
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      VITE_API_URL: http://localhost:8003
      VITE_WC_PROJECT_ID: '76b9cd0936b1b074a6c42d5efd4ea8e2'
      VITE_GOOGLE_CLIENT_ID: '292172431256-hotp58doi02m8do3kg64qq2qn9qjil9f.apps.googleusercontent.com'
      # Privy + Base — required for the new tipping flow.
      VITE_PRIVY_APP_ID: ${VITE_PRIVY_APP_ID:-}
      VITE_BASE_RPC_URL: ${VITE_BASE_RPC_URL:-https://mainnet.base.org}
      VITE_USDC_ADDRESS: ${VITE_USDC_ADDRESS:-0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913}
      VITE_DEFAULT_TIP_MICRO: ${VITE_DEFAULT_TIP_MICRO:-100000}
      VITE_DEV_QUICK_LOGIN: ${VITE_DEV_QUICK_LOGIN:-true}
    volumes:
      - ./ui:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
