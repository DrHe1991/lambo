<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitLink — Your Like Counts</title>
  <meta name="description" content="The social platform where liking is investing. Early taste earns real returns.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1714;
      --surface: #242019;
      --text: #f5f0eb;
      --text-muted: #9a918a;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 1.125rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      line-height: 1.5;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--accent);
      color: #1a1714;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1.125rem;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .download-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Bit<span>Link</span></h1>
    <p class="tagline">The social platform where your like is an investment.</p>
    <a href="/bitlink.apk" class="download-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download for Android
    </a>
    <p class="hint">Android APK &middot; <a href="https://app.bit-link.app">Open web app</a></p>
  </div>
  <div class="footer">&copy; 2026 BitLink</div>
</body>
</html>
